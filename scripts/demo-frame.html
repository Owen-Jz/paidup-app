<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box }
  html,body { width:1920px; height:1080px; overflow:hidden; background:transparent }
  /* ---------- layer: bg (opaque backdrop) ---------- */
  .bg {
    position:absolute; inset:0;
    background:
      radial-gradient(1300px 800px at 74% 14%, rgba(19,106,72,.07), transparent 60%),
      radial-gradient(1000px 700px at 12% 90%, rgba(158,43,54,.045), transparent 58%),
      repeating-linear-gradient(0deg, transparent 0 47px, rgba(21,33,27,.024) 47px 48px),
      #FAF6ED;
  }
  .bg .rule { position:absolute; inset:30px; border:1.5px solid rgba(21,33,27,.13) }
  .bg .head { position:absolute; top:44px; left:0; right:0; text-align:center;
    font-family:"JetBrains Mono",monospace; font-size:14px; letter-spacing:.26em; color:#8A8272; text-transform:uppercase }
  .bg .head b { color:#136A48; font-weight:600 }
  .bg .shadow { position:absolute; left:310px; top:952px; width:1300px; height:52px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(21,33,27,.34), transparent 72%); filter:blur(6px) }
  /* ---------- layer: frame (transparent, laptop only) ---------- */
  /* screen content rect: x=260 y=64 w=1400 h=875 */
  .lid { position:absolute; left:234px; top:38px; width:1452px; height:927px;
    border:26px solid #11141298; border-color:#111412; border-radius:34px; background:transparent;
    box-shadow: inset 0 0 0 2.5px #2E3330, 0 2px 0 1px #0B0D0C; }
  .lid::after { content:""; position:absolute; inset:-26px; border-radius:34px; pointer-events:none;
    box-shadow: inset 0 1.5px 1px rgba(255,255,255,.14); }
  .cam { position:absolute; left:952px; top:47px; width:16px; height:16px; border-radius:50%;
    background:#1E2320; box-shadow: inset 0 0 0 3px #0C0E0D, inset 0 0 3px 4px #05231b; }
  .cam::after { content:""; position:absolute; left:5px; top:4px; width:4px; height:4px; border-radius:50%; background:#3E5A50 }
  .base { position:absolute; left:140px; top:965px; width:1640px; height:25px;
    background:linear-gradient(180deg,#CFCBC2 0%, #B5B1A8 55%, #8E8A82 100%);
    border-radius:3px 3px 20px 20px; box-shadow: 0 1px 0 rgba(255,255,255,.5) inset }
  .notch { position:absolute; left:850px; top:965px; width:220px; height:11px;
    background:linear-gradient(180deg,#A5A198,#C4C0B7); border-radius:0 0 12px 12px }
</style>
</head>
<body>
<div class="bg" id="bg">
  <div class="rule"></div>
  <div class="head">PAIDUP <b>·</b> LIVE PRODUCT — RECORDED AGAINST PAIDUP.SITE <b>·</b> REAL NOMBA RAILS</div>
  <div class="shadow"></div>
</div>
<div id="laptop">
  <div class="base"></div>
  <div class="notch"></div>
  <div class="lid"></div>
  <div class="cam"></div>
</div>
<script>
  const layer = new URLSearchParams(location.search).get("layer") || "bg";
  if (layer === "bg") document.getElementById("laptop").style.display = "none";
  else document.getElementById("bg").style.display = "none";
</script>
</body>
</html>
